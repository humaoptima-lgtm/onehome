services:
  # ═══════════════════════════════════════
  # Nginx Reverse Proxy
  # ═══════════════════════════════════════
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - smart-engine
    restart: unless-stopped
    networks:
      - onehome-net

  # ═══════════════════════════════════════
  # NestJS API
  # ═══════════════════════════════════════
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env.api
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - onehome-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════
  # FastAPI Smart Engine
  # ═══════════════════════════════════════
  smart-engine:
    build:
      context: ..
      dockerfile: docker/engine.Dockerfile
    env_file:
      - .env.engine
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - onehome-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════
  # Redis (Session, Cache, Queue, Event Bus)
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-onehome_redis_dev} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - onehome-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-onehome_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # Meilisearch (Search Engine)
  # ═══════════════════════════════════════
  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-onehome_meili_dev_key}
      - MEILI_ENV=development
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili-data:/meili_data
    expose:
      - "7700"
    ports:
      - "7700:7700"  # Expose for local dev (remove in production)
    restart: unless-stopped
    networks:
      - onehome-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # PostgreSQL (Local Development Only)
  # In production, use a separate DB VPS
  # ═══════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: onehome_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onehome_pg_dev}
      POSTGRES_DB: onehome_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Expose for local dev tools
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - onehome-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onehome_user -d onehome_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  meili-data:
  pg-data:

networks:
  onehome-net:
    driver: bridge
