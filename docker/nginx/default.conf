# ═══════════════════════════════════════
# Rate Limiting Zones
# ═══════════════════════════════════════
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=engine_limit:10m rate=10r/s;

# ═══════════════════════════════════════
# API Backend → NestJS (:3001)
# ═══════════════════════════════════════
server {
    listen 80;
    server_name api.onehome.id api.localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json text/plain;

    # Health check (no rate limit)
    location /api/v1/health {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API routes
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        client_max_body_size 10M;
    }
}

# ═══════════════════════════════════════
# Smart Engine → FastAPI (:8000)
# ═══════════════════════════════════════
server {
    listen 80;
    server_name ai.onehome.id ai.localhost;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        limit_req zone=engine_limit burst=20 nodelay;

        proxy_pass http://smart-engine:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ═══════════════════════════════════════
# Default — reject unknown hosts
# ═══════════════════════════════════════
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
